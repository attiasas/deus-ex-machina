name: Release CI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set asset name
        id: asset
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="deus-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            NAME="${NAME}.exe"
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X main.version=${{ github.event.release.tag_name }}" -o "${{ steps.asset.outputs.name }}" .

      - name: Checksum
        run: sha256sum "${{ steps.asset.outputs.name }}" > "${{ steps.asset.outputs.name }}.sha256"

      - name: Upload binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.asset.outputs.name }}"

      - name: Upload checksum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.asset.outputs.name }}.sha256"

  summary:
    name: Summary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Release summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RELEASE_URL="${{ github.event.release.html_url }}"

          echo "## Release $TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View release on GitHub]($RELEASE_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Download |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY

          gh release view "$TAG" --json assets \
            --jq '.assets[] | "| `\(.name)` | [\(.name)](\(.browser_download_url)) |"' \
            --repo "${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
